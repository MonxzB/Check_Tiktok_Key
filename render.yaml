services:
  # ── Backend API (Node.js + Express) ───────────────────────────
  - type: web
    name: yt-longform-server
    runtime: node
    buildCommand: npm install --prefix server
    startCommand: node server/index.js
    envVars:
      - key: PORT
        value: 3001
      - key: YT_API_KEY
        sync: false   # Điền thủ công trong Render dashboard → Environment
